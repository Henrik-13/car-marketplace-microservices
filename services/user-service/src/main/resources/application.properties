server.port=8081

spring.application.name=user-service
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:userdb}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:userpass}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

jwt.secret=${JWT_SECRET:RQJJ0FU7aM+A7OVIEErAIBdebegP+mjt4HCE6bPqJQA=}
jwt.expiration=${JWT_EXPIRATION:86400000}
