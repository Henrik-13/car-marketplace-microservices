server.port=${SERVER_PORT:8082}

spring.application.name=listing-service
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:listingdb}
spring.datasource.username=${DB_USERNAME:listing}
spring.datasource.password=${DB_PASSWORD:listingpass}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true

jwt.secret=${JWT_SECRET:RQJJ0FU7aM+A7OVIEErAIBdebegP+mjt4HCE6bPqJQA=}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:cache-service}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}

s3.endpoint=${S3_ENDPOINT_URL:https://fra1.digitaloceanspaces.com}
s3.access-key=${S3_ACCESS_KEY:admin}
s3.secret-key=${S3_SECRET_KEY:password123}
s3.bucket-name=${S3_BUCKET_NAME:car-images}

prediction.service.url=${PREDICTION_SERVICE_URL:http://prediction-service:8083/predict}
