apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: car-marketplace
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/part-of: car-marketplace
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: "8081"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: user-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
