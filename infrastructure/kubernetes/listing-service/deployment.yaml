apiVersion: apps/v1
kind: Deployment
metadata:
  name: listing-service
  namespace: car-marketplace
  labels:
    app.kubernetes.io/name: listing-service
    app.kubernetes.io/part-of: car-marketplace
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: listing-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: listing-service
        app.kubernetes.io/part-of: car-marketplace
    spec:
      containers:
        - name: listing-service
          image: ghcr.io/henrik-13/listing-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          envFrom:
            - configMapRef:
                name: listing-service-config
            - secretRef:
                name: listing-service-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            failureThreshold: 30
            periodSeconds: 10
