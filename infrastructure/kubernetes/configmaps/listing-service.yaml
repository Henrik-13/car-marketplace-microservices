apiVersion: v1
kind: ConfigMap
metadata:
  name: listing-service-config
  namespace: car-marketplace
  labels:
    app.kubernetes.io/name: listing-service
    app.kubernetes.io/part-of: car-marketplace
data:
  SERVER_PORT: "8082"
  SPRING_PROFILES_ACTIVE: "prod"
  LOGGING_LEVEL_ROOT: "INFO"
  SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: "10MB"
  SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: "10MB"
  PREDICTION_SERVICE_URL: "http://prediction-service.car-marketplace.svc.cluster.local:8083/predict"
