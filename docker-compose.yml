services:
  # ==========================================
  # 1. ADATBÁZISOK ÉS INFRASTRUKTÚRA
  # ==========================================

  user-db:
    image: postgres:16-alpine
    container_name: user-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: userpass
      POSTGRES_DB: userdb
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - car-market-net

  listing-db:
    image: postgres:16-alpine
    container_name: listing-db
    restart: always
    environment:
      POSTGRES_USER: listing
      POSTGRES_PASSWORD: listingpass
      POSTGRES_DB: listingdb
    ports:
      - "5432:5432"
    volumes:
      - listing-db-data:/var/lib/postgresql/data
    networks:
      - car-market-net

  cache-service:
    build:
      context: ./services/cache-service
    container_name: cache-service
    restart: always
    ports:
      - "6379:6379"
    networks:
      - car-market-net

  # ==========================================
  # 2. MIKROSZERVÍZEK (ALKALMAZÁSOK)
  # ==========================================

  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    restart: on-failure
    depends_on:
      - user-db
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://user-db:5432/userdb
      - SPRING_DATASOURCE_USERNAME=userdbadmin
      - SPRING_DATASOURCE_PASSWORD=userdbpass
      - JWT_SECRET=RQJJ0FU7aM+A7OVIEErAIBdebegP+mjt4HCE6bPqJQA=
    networks:
      - car-market-net

  listing-service:
    build:
      context: ./services/listing-service
    container_name: listing-service
    restart: on-failure
    depends_on:
      - listing-db
      - cache-service
      - user-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://listing-db:5432/listingdb
      - SPRING_DATASOURCE_USERNAME=listing
      - SPRING_DATASOURCE_PASSWORD=listingpass
      - SPRING_DATA_REDIS_HOST=cache-service
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=RQJJ0FU7aM+A7OVIEErAIBdebegP+mjt4HCE6bPqJQA=
      - PREDICTION_SERVICE_URL=http://prediction-service:8083/predict
    networks:
      - car-market-net

  prediction-service:
    build:
      context: ./services/prediction-service
    container_name: prediction-service
    restart: always
    ports:
      - "8083:8083"
    networks:
      - car-market-net

# ==========================================
# 3. KÖTETEK ÉS HÁLÓZATOK DEFINIÁLÁSA
# ==========================================
volumes:
  user-db-data:
  listing-db-data:

networks:
  car-market-net:
    driver: bridge
